<!DOCTYPE html>
<html lang="hi">
  <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
	<title>Sunny System | Complete Business Management</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-gradient: linear-gradient(145deg, #101f2c 0%, #0a1722 100%);
      --card-bg: rgba(255, 255, 255, 0.96);
      --form-bg: #fefaf5;
      --text-color: #2c3e4e;
      --heading-color: #1f5e74;
      --primary: #ffb347;
      --primary-dark: #e67e00;
      --secondary: #1f5e74;
      --font-size: 15px;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      padding: 12px;
      font-family: 'Segoe UI', Roboto, 'Inter', sans-serif;
      transition: all 0.3s ease;
      font-size: var(--font-size);
      color: var(--text-color);
    }

    body.lang-en [data-hi] { display: none; }
    body.lang-hi [data-en] { display: none; }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      overflow: hidden;
      display: none;
      transition: all 0.3s ease;
    }

    .form-card {
      background: var(--form-bg);
      border-radius: 16px;
      padding: clamp(12px, 3vh, 16px);
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .brand-header {
      background: linear-gradient(135deg, #0a2f44, #0b3b4f);
      padding: 20px;
      text-align: center;
    }
    .app-title {
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .app-title span {
      color: #ffb347;
      font-size: clamp(26px, 7vw, 38px);
    }
    .tagline {
      font-size: clamp(11px, 3vw, 13px);
      color: #ffecb3;
      margin-top: 10px;
      display: inline-block;
      background: rgba(0,0,0,0.3);
      padding: 6px 20px;
      border-radius: 50px;
      animation: blinkPulse 1.2s step-start infinite, glowText 2s alternate infinite;
      font-weight: 500;
    }
    @keyframes blinkPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes glowText {
      0% { text-shadow: 0 0 0px #ffb347; box-shadow: 0 0 0px rgba(255,180,71,0); }
      100% { text-shadow: 0 0 5px #ffb347; box-shadow: 0 0 8px rgba(255,180,71,0.3); }
    }

    .dashboard-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(30px, 8vh, 60px) clamp(20px, 5vw, 40px);
      gap: clamp(35px, 8vh, 60px);
      background: rgba(0,0,0,0.02);
      min-height: clamp(450px, 65vh, 550px);
    }
    .nav-row {
      display: flex;
      justify-content: center;
      gap: clamp(40px, 10vw, 100px);
      flex-wrap: wrap;
    }
    .nav-item-large {
      background: linear-gradient(145deg, #ffffff, #e8e4dc);
      border-radius: clamp(20px, 5vw, 28px);
      padding: clamp(18px, 4vh, 28px) clamp(25px, 6vw, 35px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(12px, 2.5vh, 18px);
      cursor: pointer;
      min-width: clamp(120px, 22vw, 160px);
      box-shadow: 10px 10px 20px rgba(0,0,0,0.15), -5px -5px 10px rgba(255,255,255,0.7);
      transition: all 0.25s ease;
    }
    .nav-item-large:active {
      transform: translateY(-5px);
      box-shadow: 15px 15px 25px rgba(0,0,0,0.2);
    }
    .nav-item-large i {
      font-size: clamp(42px, 10vw, 60px);
      background: linear-gradient(145deg, #e67e00, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.2));
    }
    .nav-item-large span {
      font-weight: 700;
      color: #2c3e4e;
      letter-spacing: 0.5px;
    }

    .page-container {
      padding: clamp(12px, 3vh, 20px);
      max-height: 70vh;
      overflow-y: auto;
    }
    
    @media (orientation: landscape) and (max-height: 500px) {
      .dashboard-grid { flex-direction: row; flex-wrap: wrap; gap: 20px; padding: 15px; min-height: auto; }
      .nav-row { flex-direction: row; gap: 25px; }
      .nav-item-large { padding: 12px 18px; min-width: 100px; }
      .nav-item-large i { font-size: 32px; }
      .nav-item-large span { font-size: 12px; }
      .page-container { max-height: 65vh; }
    }

    .form-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      flex-wrap: wrap;
      gap: 10px;
    }
    .home-btn {
      background: linear-gradient(145deg, #ffb347, #ff9800);
      color: white;
      padding: 8px 16px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 3px 3px 6px rgba(0,0,0,0.2);
    }
    .home-btn:active { transform: translateY(2px); }

    h2 {
      border-left: 4px solid #ffb347;
      padding-left: 12px;
      margin-bottom: 15px;
      color: var(--heading-color);
    }
    h3 {
      margin: 15px 0 10px 0;
      color: var(--heading-color);
    }
    
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
      color: var(--heading-color);
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #e0d6c8;
      background: white;
    }
    button {
      background: linear-gradient(145deg, #1f5e74, #0f3e4f);
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 3px 3px 6px rgba(0,0,0,0.2);
      transition: all 0.1s ease;
    }
    button:active { transform: translateY(2px); }
    .contact-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .contact-picker { 
      background: linear-gradient(145deg, #25D366, #128C7E); 
      flex: 1; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      padding: 10px;
    }
    
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 10px 0;
      border-radius: 12px;
    }
    table { 
      width: 100%; 
      border-collapse: collapse;
      min-width: 300px;
    }
    th, td { 
      padding: 8px 6px; 
      border-bottom: 1px solid #eee; 
      text-align: left; 
    }
    th { background: #fff0e0; }
    
    .photo-box {
      width: 100%;
      height: clamp(100px, 25vh, 130px);
      background: #f0f0f0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 12px;
      overflow: hidden;
    }
    
    .timer-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      z-index: 200;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 5px 5px 12px rgba(0,0,0,0.3), -2px -2px 4px rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
    }
    .timer-toast button {
      background: linear-gradient(145deg, #ff4444, #cc0000);
      padding: 4px 12px;
      margin: 0;
      border-radius: 30px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    
    .action-buttons {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .action-buttons button {
      padding: 4px 8px;
      border-radius: 8px;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.15);
    }
    .view-btn { background: linear-gradient(145deg, #ffb347, #e67e00); }
    .edit-btn { background: linear-gradient(145deg, #1f5e74, #0f3e4f); }
    .delete-btn { background: linear-gradient(145deg, #b91c1c, #8b0000); }
    .quick-delete-btn { background: linear-gradient(145deg, #ff4444, #cc0000); }
    .pay-btn { background: linear-gradient(145deg, #2e7d32, #1b5e20); }
    
    .pdf-popup, .detail-popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .popup-content {
      background: linear-gradient(145deg, #fff, #f8f4f0);
      border-radius: 24px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
      animation: popupFadeIn 0.3s ease;
    }
    @keyframes popupFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .detail-label { 
      font-weight: bold; 
      color: #1f5e74; 
      min-width: 130px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-value { 
      color: #333; 
      flex: 1;
      text-align: right;
      font-weight: 500;
    }
    
    .slider-container {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    input[type="range"] {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      background: #ffb347;
      border-radius: 5px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #ffb347;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    
    .search-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .search-tab {
      background: #e0d6c8;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    .search-tab.active {
      background: #ffb347;
      color: white;
    }
    
    .edit-form-popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }
    .edit-form-content {
      background: linear-gradient(145deg, #fff, #f8f4f0);
      border-radius: 24px;
      width: 90%;
      max-width: 450px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 20px 20px 40px rgba(0,0,0,0.4);
      animation: popupFadeIn 0.3s ease;
    }
    
    .color-option {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .color-option:hover {
      transform: scale(1.1);
      border-color: white;
    }
    
    .about-card {
      text-align: center;
    }
    .about-card .detail-row {
      justify-content: center;
    }
    .about-card .detail-label {
      min-width: auto;
    }
    
    /* Date Search Section */
    .date-search-card {
      background: linear-gradient(145deg, #e8f0fe, #dde6f5);
    }
    
    @media (min-width: 768px) and (orientation: landscape) {
      .dashboard-grid { flex-direction: row; justify-content: center; align-items: center; gap: 40px; }
      .nav-row { flex-direction: column; gap: 40px; }
      .nav-item-large { padding: 28px 38px; }
      .nav-item-large i { font-size: 55px; }
    }
</style>
  </head>
  <body class="lang-hi">
	<div class="login-overlay" id="loginOverlay">
	  <div class="login-box">
		<h2>🔐 <span data-hi>SUNNY SYSTEM</span><span data-en>SUNNY SYSTEM</span></h2>
		<input type="text" id="loginUser" placeholder="User ID" value="admin">
		<input type="password" id="loginPass" placeholder="Password" value="admin123">
		<button onclick="verifyLogin()"><span data-hi>लॉगिन करें</span><span data-en>Login</span></button>
		<div id="loginError" class="error-msg"></div>
	  </div>
	</div>

	<div class="app-container" id="appContainer">
	  <div class="brand-header">
		<div class="app-title">SUNNY <span>SYSTEM</span></div>
		<div class="tagline"><span data-hi>✨ प्रोफेशनल बिजनेस मैनेजमेंट | बिलिंग • स्टॉक • रिपेयर • रिपोर्ट ✨</span><span data-en>✨ Professional Business Management | Billing • Stock • Repair • Report ✨</span></div>
	  </div>
	  <div id="dynamicContent"></div>
	</div>

<script>
  // ==================== LANGUAGE SYSTEM ====================
  let currentLang = localStorage.getItem('sani_lang') || 'hi';
  
  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('sani_lang', lang);
    if(lang === 'hi') {
      document.body.classList.remove('lang-en');
      document.body.classList.add('lang-hi');
    } else {
      document.body.classList.remove('lang-hi');
      document.body.classList.add('lang-en');
    }
    if(currentPage === 'dashboard') renderDashboard();
    else if(currentPage === 'billing') renderBillingPage();
    else if(currentPage === 'stock') renderStockPage();
    else if(currentPage === 'repair') renderRepairPage();
    else if(currentPage === 'report') renderReportPage();
    else if(currentPage === 'search') renderSearchPage();
    else if(currentPage === 'setting') renderSettingPage();
  }
  
  if(localStorage.getItem('sani_lang') === 'en') {
    document.body.classList.remove('lang-hi');
    document.body.classList.add('lang-en');
  } else {
    document.body.classList.remove('lang-en');
    document.body.classList.add('lang-hi');
  }

  // ==================== PAGE STATE ====================
  let currentPage = 'dashboard';
  
  function navigateTo(page) {
    currentPage = page;
    if(page === 'dashboard') renderDashboard();
    else if(page === 'billing') renderBillingPage();
    else if(page === 'stock') renderStockPage();
    else if(page === 'repair') renderRepairPage();
    else if(page === 'report') renderReportPage();
    else if(page === 'search') renderSearchPage();
    else if(page === 'setting') renderSettingPage();
  }
  
  function goToHome() { navigateTo('dashboard'); }

  // ==================== AUTH ====================
  let currentPassword = "admin123";
  let otpCode = null;
  let pendingResetPhone = null;
  
  function sendOTP() {
    let phone = document.getElementById('resetPhone')?.value;
    if(!phone || phone.length < 10) {
      alert(currentLang === 'hi' ? "सही मोबाइल नंबर डालें (10 अंक)" : "Enter valid mobile number (10 digits)");
      return;
    }
    phone = phone.toString().replace(/\D/g, '');
    if(phone.startsWith('0')) phone = phone.substring(1);
    if(!phone.startsWith('91')) phone = '91' + phone;
    
    pendingResetPhone = phone;
    otpCode = Math.floor(100000 + Math.random() * 900000).toString();
    
    alert(currentLang === 'hi' ? `⚠️ डेमो मोड: OTP ${otpCode}\n\nOTP इस नंबर पर भेजा जाएगा: ${phone}\n\nवास्तविक SMS के लिए backend API सेट करें।` : `⚠️ Demo Mode: OTP ${otpCode}\n\nOTP will be sent to: ${phone}\n\nFor real SMS, set up backend API.`);
    
    let otpSection = document.getElementById('otpSection');
    if(otpSection) otpSection.style.display = 'block';
  }
  
  function verifyOTPAndReset() {
    let enteredOtp = document.getElementById('otpInput')?.value;
    let newPass = document.getElementById('newPassword')?.value;
    if(!enteredOtp || enteredOtp !== otpCode) {
      alert(currentLang === 'hi' ? "गलत OTP!" : "Wrong OTP!");
      return;
    }
    if(!newPass || newPass.length < 4) {
      alert(currentLang === 'hi' ? "नया पासवर्ड कम से कम 4 अंक का होना चाहिए" : "Password must be at least 4 characters");
      return;
    }
    currentPassword = newPass;
    alert(currentLang === 'hi' ? "पासवर्ड सफलतापूर्वक बदल गया!" : "Password changed successfully!");
    let otpSection = document.getElementById('otpSection');
    if(otpSection) otpSection.style.display = 'none';
    document.getElementById('resetPhone').value = '';
    document.getElementById('otpInput').value = '';
    document.getElementById('newPassword').value = '';
  }
  
  function verifyLogin() {
    let user = document.getElementById('loginUser').value;
    let pass = document.getElementById('loginPass').value;
    if(user === "admin" && pass === currentPassword) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
      renderDashboard();
    } else {
      document.getElementById('loginError').innerText = currentLang === 'hi' ? "गलत यूजर आईडी या पासवर्ड!" : "Wrong username or password!";
    }
  }

  // ==================== DATA ====================
  let products = JSON.parse(localStorage.getItem('sunny_products')) || [
    { id: "P001", name: "लेज़र डायोड", model: "LD-5W", desc: "5W लेज़र डायोड", purchase: 1200, selling: 1850, qty: 12, photo: "" },
    { id: "P002", name: "कूलिंग फैन", model: "CF-12V", desc: "12V कूलिंग फैन", purchase: 300, selling: 450, qty: 28, photo: "" },
    { id: "P003", name: "रेसिस्टर किट", model: "RK-100", desc: "100 पीस रेसिस्टर", purchase: 200, selling: 320, qty: 45, photo: "" }
  ];
  let invoices = JSON.parse(localStorage.getItem('sunny_invoices')) || [];
  let repairJobs = JSON.parse(localStorage.getItem('sunny_repairs')) || [];
  let currentCart = [];
  let activeDeleteTimers = {};

  function saveAllData() {
    localStorage.setItem('sunny_products', JSON.stringify(products));
    localStorage.setItem('sunny_invoices', JSON.stringify(invoices));
    localStorage.setItem('sunny_repairs', JSON.stringify(repairJobs));
  }

  function getToday() { return new Date().toISOString().slice(0,10); }
  function generateBillId() { return "BIL-" + (invoices.length+1).toString().padStart(4,'0'); }

  // ==================== DELETE WITH TIMER ====================
  function startDeleteTimer(itemId, type, itemName, callback) {
    if(activeDeleteTimers[itemId]) {
      clearTimeout(activeDeleteTimers[itemId]);
      activeDeleteTimers[itemId] = null;
    }
    
    let toast = document.createElement('div');
    toast.className = 'timer-toast';
    toast.id = `toast-${itemId}`;
    toast.innerHTML = `
      <span>⚠️ "${itemName.substring(0, 20)}" 10s में डिलीट होगा</span>
      <button onclick="cancelDeleteTimer('${itemId}')">रद्द</button>
      <button onclick="quickDeleteNow('${itemId}', '${type}')">अभी</button>
    `;
    document.body.appendChild(toast);
    
    let timer = setTimeout(() => {
      callback();
      let toastEl = document.getElementById(`toast-${itemId}`);
      if(toastEl) toastEl.remove();
      delete activeDeleteTimers[itemId];
    }, 10000);
    
    activeDeleteTimers[itemId] = timer;
  }
  
  function cancelDeleteTimer(itemId) {
    if(activeDeleteTimers[itemId]) {
      clearTimeout(activeDeleteTimers[itemId]);
      delete activeDeleteTimers[itemId];
    }
    let toast = document.getElementById(`toast-${itemId}`);
    if(toast) toast.remove();
    alert(currentLang === 'hi' ? "डिलीट रद्द कर दिया गया!" : "Delete cancelled!");
  }
  
  function quickDeleteNow(itemId, type) {
    if(activeDeleteTimers[itemId]) {
      clearTimeout(activeDeleteTimers[itemId]);
      delete activeDeleteTimers[itemId];
    }
    let toast = document.getElementById(`toast-${itemId}`);
    if(toast) toast.remove();
    
    if(type === 'stock') {
      products = products.filter(p => p.id !== itemId);
    } else if(type === 'billing') {
      invoices = invoices.filter(i => i.id !== itemId);
    } else if(type === 'repair') {
      repairJobs = repairJobs.filter(r => r.id !== itemId);
    }
    saveAllData();
    if(type === 'stock') performStockSearch();
    else if(type === 'billing') performBillingSearch();
    else if(type === 'repair') performRepairSearch();
    else if(type === 'report') renderReportPage();
    alert(currentLang === 'hi' ? "आइटम तुरंत डिलीट हो गया!" : "Item deleted immediately!");
  }

  // ==================== DASHBOARD ====================
  function renderDashboard() {
    document.getElementById("dynamicContent").innerHTML = `
      <div class="dashboard-grid">
        <div class="nav-row">

  window.pickBillingContact = function() {
    if('contacts' in navigator && navigator.contacts) {
      navigator.contacts.select(['name', 'tel'], { multiple: false })
        .then(contacts => { if(contacts.length) {
          document.getElementById('custName').value = contacts[0].name[0] || '';
          document.getElementById('custMobile').value = contacts[0].tel[0] || '';
        }}).catch(() => alert(currentLang === 'hi' ? "कॉन्टैक्ट एक्सेस नहीं हुआ" : "Contact access failed"));
    } else alert(currentLang === 'hi' ? "कॉन्टैक्ट पिकर सपोर्ट नहीं" : "Contact picker not supported");
  };
  
  window.addBillItem = function() {
    let pid = document.getElementById('billProdSelect')?.value;
    let qty = parseInt(document.getElementById('billQty')?.value);
    if(!pid || qty<1) return alert(currentLang === 'hi' ? "सही मात्रा डालें" : "Enter valid quantity");
    let prod = products.find(p=>p.id===pid);
    if(!prod || prod.qty < qty) return alert(`${currentLang === 'hi' ? 'स्टॉक में' : 'Stock available:'} ${prod?.qty||0}`);
    let exist = currentCart.find(i=>i.pid===pid);
    if(exist) { exist.qty += qty; exist.total = exist.qty * exist.selling; }
    else currentCart.push({ pid, name: prod.name, price: prod.selling, qty, total: prod.selling * qty });
    renderBillingPage();
  };
  window.removeBillItem = function(idx) { currentCart.splice(idx,1); renderBillingPage(); };
  window.clearBillForm = function() { 
    if(confirm(currentLang === 'hi' ? "सारा फॉर्म क्लियर?" : "Clear entire form?")) { 
      currentCart = [];
      document.getElementById('custName').value = '';
      document.getElementById('custMobile').value = '';
      document.getElementById('billDate').value = getToday();
      document.getElementById('paidAmount').value = 0;
      renderBillingPage();
    } 
  };

    let total = currentCart.reduce((s,i)=>s+i.total,0);
    let html = `<div style="padding:20px;"><h2>SUNNY SYSTEM</h2><p>Bill ID: ${generateBillId()}</p><p>Date: ${getToday()}</p><p>Customer: ${cust} | Mobile: ${mobile}</p><div class="table-wrapper"><table><thead><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr></thead><tbody>${currentCart.map(i=>`<tr><td>${i.name}<\/td><td>₹${i.price}<\/td><td>${i.qty}<\/td><td>₹${i.total}<\/td><\/tr>`).join('')}<tr><td colspan="3"><b>Total<\/b><\/td><td><b>₹${total}<\/b><\/td><\/tr><\/tbody></table><\/div><\/div>`;

  window.downloadPDFnow = function() {
    let element = document.createElement('div');
    element.innerHTML = window.pdfContent;
    html2pdf().from(element).set({ margin: 0.5, filename: 'Invoice.pdf' }).save();
    document.querySelector('.pdf-popup')?.remove();
    let cust = document.getElementById('custName').value;
    let mob = document.getElementById('custMobile').value;
    let total = currentCart.reduce((s,i)=>s+i.total,0);
    for(let it of currentCart) {
      let p = products.find(pr=>pr.id===it.pid);
      if(p) p.qty -= it.qty;
    }
    invoices.push({ id: generateBillId(), date: getToday(), customer: cust, mobile: mob, items: [...currentCart], total, paid: parseFloat(document.getElementById('paidAmount').value) || 0 });
    currentCart = [];
    saveAllData();
    renderBillingPage();
    alert(currentLang === 'hi' ? "बिल सेव और PDF तैयार!" : "Bill saved and PDF ready!");
  };

      let file = e.target.files[0];
      if(file) {
        let reader = new FileReader();
        reader.onload = function(ev) { 
          selectedPhotoData = ev.target.result;
          let preview = document.getElementById('stockPhotoPreview');
          if(preview) preview.innerHTML = `<img src="${selectedPhotoData}" style="width:100%; height:100%; object-fit:cover;">`;
        };
        reader.readAsDataURL(file);
      }
    };
    input.click();
  };

  function getBillingTotalDue() {

      let due = (inv.total || 0) - (inv.paid || 0);
      return sum + Math.max(0, due);
    }, 0);
  }
  
  function getRepairTotal() {
    return repairJobs.reduce((sum, job) => sum + (job.total || 0), 0);
  }
  
  function getRepairTotalDue() {
    return repairJobs.reduce((sum, job) => sum + (job.due || 0), 0);
  }
  
  function getAllReportData() {
    let allItems = [];
    
    invoices.forEach(inv => {
      let due = (inv.total || 0) - (inv.paid || 0);
      allItems.push({
        id: inv.id,
        type: 'बिलिंग',
        customer: inv.customer,
        description: inv.items ? inv.items.map(i => i.name).join(', ') : 'बिल आइटम',
        amount: inv.total || 0,
        paid: inv.paid || 0,
        due: Math.max(0, due),
        date: inv.date,
        mobile: inv.mobile,
        items: inv.items || []
      });
    });
    
    repairJobs.forEach(job => {
      allItems.push({
        id: job.id,
        type: 'रिपेयर',
        customer: job.customer,
        description: job.device || job.brand + ' ' + job.model,
        amount: job.total || 0,
        paid: job.paid || 0,
        due: job.due || 0,
        date: job.date || '-',
        mobile: job.mobile,
        problem: job.problem,
        status: job.status,
        items: job.items || []
      });

    return allItems;

  window.processPayment = function(id, type) {
    let amount = parseFloat(document.getElementById('paymentAmount').value);
    if(isNaN(amount) || amount <= 0) {
      alert(currentLang === 'hi' ? "सही राशि डालें" : "Enter valid amount");
      return;
    }
    
    if(type === 'बिलिंग') {
      let bill = invoices.find(i => i.id === id);
      if(bill) {
        let newPaid = (bill.paid || 0) + amount;
        if(newPaid > bill.total) newPaid = bill.total;
        bill.paid = newPaid;
        alert(currentLang === 'hi' ? `₹${amount} का भुगतान हो गया! नया बकाया: ₹${bill.total - newPaid}` : `Payment of ₹${amount} successful! New due: ₹${bill.total - newPaid}`);
      }
    } else if(type === 'रिपेयर') {
      let job = repairJobs.find(r => r.id === id);
      if(job) {
        let newPaid = (job.paid || 0) + amount;
        if(newPaid > job.total) newPaid = job.total;
        job.paid = newPaid;
        job.due = job.total - newPaid;
        alert(currentLang === 'hi' ? `₹${amount} का भुगतान हो गया! नया बकाया: ₹${job.due}` : `Payment of ₹${amount} successful! New due: ₹${job.due}`);
      }
    }
    
    saveAllData();
    document.querySelector('.edit-form-popup')?.remove();
    renderReportPage();
  };

    let results = repairJobs.filter(r => r.customer.toLowerCase().includes(keyword) || r.mobile.includes(keyword) || r.brand.toLowerCase().includes(keyword));
    let resultHtml = '';
    if(results.length === 0) {
      resultHtml = '<div class="form-card"><i class="fas fa-search"></i> <span data-hi="कोई जॉब नहीं">कोई जॉब नहीं</span><span data-en="No jobs found">No jobs found</span></div>';
    } else {
      resultHtml = '<div class="table-wrapper"><table style="width:100%"><thead><tr><th><i class="fas fa-user"></i> <span data-hi="ग्राहक">ग्राहक</span></th><th><i class="fas fa-phone"></i> <span data-hi="मोबाइल">मोबाइल</span></th><th><i class="fas fa-industry"></i> <span data-hi="ब्रांड">ब्रांड</span></th><th><i class="fas fa-flag-checkered"></i> <span data-hi="स्टेटस">स्टेटस</span></th><th><i class="fas fa-rupee-sign"></i> <span data-hi="राशि">राशि</span></th><th><i class="fas fa-cogs"></i> <span data-hi="एक्शन">एक्शन</span></th></tr></thead><tbody>';
      results.forEach(r => {
        resultHtml += `<tr>
          <td>${r.customer}</td>
          <td>${r.mobile}</td>
          <td>${r.brand}</td>
          <td><span class="badge" style="background:${r.status === 'Completed' ? '#2e7d32' : '#ed6c02'}; color:white; padding:2px 8px; border-radius:20px;">${r.status}</span></td>
          <td>₹${r.total}</td>
          <td class="action-buttons">
            <button class="view-btn" onclick="viewRepairItem(${JSON.stringify(r).replace(/"/g, '&quot;')})"><i class="fas fa-eye"></i> <span data-hi="देखें">देखें</span></button>
            <button class="delete-btn" onclick="deleteRepairItem('${r.id}', '${r.customer}')"><i class="fas fa-trash"></i> 10s</button>

          </td>
        </tr>`;
      });
      resultHtml += '</tbody></table></div>';
    }
    let resultsDiv = document.getElementById('repairSearchResults');
    if(resultsDiv) resultsDiv.innerHTML = resultHtml;

  window.selectWallpaperFromGallery = function() {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
      let file = e.target.files[0];
      if(file) {
        let reader = new FileReader();
        reader.onload = function(ev) {
          document.body.style.backgroundImage = `url(${ev.target.result})`;
          document.body.style.backgroundSize = 'cover';
          document.body.style.backgroundPosition = 'center';
          document.body.style.backgroundAttachment = 'fixed';
          localStorage.setItem('sunny_wallpaper', ev.target.result);
          localStorage.removeItem('sunny_bg_color');
        };
        reader.readAsDataURL(file);
      }
    };
    input.click();
  };

      reader.onload = ev => {

        alert(currentLang === 'hi' ? "रीस्टोर हो गया!" : "Restored!");

    };

  };
